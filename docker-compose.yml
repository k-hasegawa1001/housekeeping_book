services:
  web:
    image: nginx:alpine
    container_name: housekeeping-book-web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - housekeeping-book-net

  backend:
    build: ./backend
    container_name: housekeeping-book-backend
    depends_on:
      db:
        condition: service_healthy
    networks:
      - housekeeping-book-net
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: mysql+pymysql://user:password@db:3306/housekeeping_book

  frontend:
    build: ./frontend
    container_name: housekeeping-book-frontend
    depends_on:
      - backend
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - housekeeping-book-net

  db:
    image: mysql:latest
    container_name: housekeeping-book-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: housekeeping_book
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - housekeeping-book-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  db_data:

networks:
  housekeeping-book-net:
    driver: bridge
